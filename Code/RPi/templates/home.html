<!DOCTYPE html>
<html>
<head>
    <title>Hike Sessions</title>
</head>
<body>
    <h1>Hiking Sessions</h1>

    <ul>
        {% for session in sessions %}
            <li>
                ID: {{ session.id }} |
                KM: {{ "%.2f"|format(session.km) }} |
                Steps: {{ session.steps }} |
                Kcal: {{ "%.2f"|format(session.kcal) }} |
                Time: {{ session.time }}

                <form action="/sessions/{{ session.id }}/delete" method="post" style="display:inline;">
                    <button type="submit">Delete</button>
                </form>
            </li>
        {% endfor %}
    </ul>

</body>
</html>
